# ─────────────────────────────────────────
#  INFORMATIONS DU SITE
# ─────────────────────────────────────────
site_name: packi (Package Installer)
site_description: "Smart CLI package installer pour Node.js - Installez toutes vos dependances npm en une seule commande"
site_author: Bekono Beyas Ambroise (ThorLex)
copyright: "Copyright 2024 Bekono Beyas Ambroise (ThorLex)"
site_url: https://pack-installer.ambbeyas.com/

# ─────────────────────────────────────────
#  DEPOT GIT
# ─────────────────────────────────────────
repo_url: https://github.com/ThorLex/packInstaller
repo_name: ThorLex/packInstaller
edit_uri: edit/main/docs/

# ─────────────────────────────────────────
#  THEME
# ─────────────────────────────────────────
theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: deep purple
      accent: green
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: deep purple
      accent: green
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

# ─────────────────────────────────────────
#  DOSSIERS
# ─────────────────────────────────────────
docs_dir: docs
site_dir: site

# ─────────────────────────────────────────
#  FICHIERS STATIQUES
# ─────────────────────────────────────────
extra_css:
  - css/extra.css

extra_javascript:
  - js/extra.js

# ─────────────────────────────────────────
#  EXTENSIONS MARKDOWN
# ─────────────────────────────────────────
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true
      permalink_title: Lien permanent vers cette section
      toc_depth: 2
      title: Sur cette page
      separator: "-"

# ─────────────────────────────────────────
#  PLUGINS
# ─────────────────────────────────────────
plugins:
  - search:
      lang: fr
      separator: '[\s\-\.]+'

# ─────────────────────────────────────────
#  EXTRA
# ─────────────────────────────────────────
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ThorLex
      name: ThorLex sur GitHub
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/packi
      name: packi sur npm
    - icon: fontawesome/solid/envelope
      link: mailto:b.galaxy.dev@gmail.com
      name: Contacter ThorLex
  generator: true
