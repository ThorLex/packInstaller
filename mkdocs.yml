site_name: packi (Package Installer)
site_description: "CLI resilient pour Node.js : installation en lot depuis requirements.txt avec meilleure tolerance aux incidents reseau"
site_author: Bekono Beyas Ambroise (ThorLex)
copyright: "Copyright 2024 Bekono Beyas Ambroise (ThorLex)"
site_url: https://pack-installer.ambbeyas.com/

repo_url: https://github.com/ThorLex/packInstaller
repo_name: ThorLex/packInstaller
edit_uri: edit/main/docs/

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: deep purple
      accent: green
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: deep purple
      accent: green
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.left
    - search.suggest
    - search.highlight
    - content.code.copy

docs_dir: docs
site_dir: site

extra_css:
  - css/extra.css

extra_javascript:
  - js/extra.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true
      permalink_title: Lien permanent vers cette section
      toc_depth: 2
      title: Sur cette page
      separator: "-"
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search:
      lang: fr
      separator: '[\\s\\-\\.]+'

nav:
  - Accueil: index.md
  - Prise en main:
      - Installation: home/index.md
      - A propos: home/about.md
      - Fonctionnement interne: home/fonctionnement.md
      - Contribuer: home/contribuer.md
  - Utilisation:
      - Vue d'ensemble: utilisation/index.md
      - Commandes: utilisation/commandes.md
      - Freeze: utilisation/freeze.md
      - requirements.txt: utilisation/requirements.md
  - Reference:
      - Configuration: reference/configuration.md
      - Base locale exists.txt: reference/database.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ThorLex
      name: ThorLex sur GitHub
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/@beyas/packi
      name: packi sur npm
    - icon: fontawesome/solid/envelope
      link: mailto:b.galaxy.dev@gmail.com
      name: Contacter ThorLex
  generator: true
