# ─────────────────────────────────────────
#  INFORMATIONS DU SITE
# ─────────────────────────────────────────
site_name: packi (Package Installer)
site_url: https://thorlex.github.io/packInstaller/
site_description: Smart CLI package installer pour Node.js - Installez toutes vos dependances npm en une seule commande depuis un fichier requirements.txt
site_author: Bekono Beyas Ambroise (ThorLex)
copyright: Copyright &copy; 2024 Bekono Beyas Ambroise (ThorLex)

# ─────────────────────────────────────────
#  DEPOT GIT
# ─────────────────────────────────────────
repo_url: https://github.com/ThorLex/packInstaller
repo_name: ThorLex/packInstaller
edit_uri: edit/main/docs/

# ─────────────────────────────────────────
#  NAVIGATION
# ─────────────────────────────────────────

# ─────────────────────────────────────────
#  THEME
# ─────────────────────────────────────────
theme:
  name: readthedocs

  static_templates:
    - 404.html
  include_search_page: true
  search_index_only: false
  highlightjs: true
  hljs_languages:
    - javascript
    - bash
    - json
    - yaml
  titles_only: false
  sticky_navigation: true
  locale: fr

# ─────────────────────────────────────────
#  DOSSIERS
# ─────────────────────────────────────────
docs_dir: docs
site_dir: site

# ─────────────────────────────────────────
#  FICHIERS STATIQUES
# ─────────────────────────────────────────
extra_css:
  - css/extra.css

extra_javascript:
  - js/extra.js

# ─────────────────────────────────────────
#  EXTENSIONS MARKDOWN
# ─────────────────────────────────────────
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true
      permalink_title: Lien permanent vers cette section
      toc_depth: 3
      title: Sur cette page
      separator: "-"

# ─────────────────────────────────────────
#  PLUGINS
# ─────────────────────────────────────────
plugins:
  - search:
      lang: fr
      separator: '[\s\-\.]+'

# ─────────────────────────────────────────
#  EXTRA (variables globales)
# ─────────────────────────────────────────
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ThorLex
      name: ThorLex sur GitHub
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/packi
      name: packi sur npm
    - icon: fontawesome/solid/envelope
      link: mailto:b.galaxy.dev@gmail.com
      name: Contacter ThorLex
  generator: true
  homepage: https://thorlex.github.io/packInstaller/
